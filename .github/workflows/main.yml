name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write   # 🔥 IMPORTANT (fixes error 128)

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: saipraveen-k
          outputs: |
            dist/github-contribution-grid-snake.svg

      - name: Push snake to output branch
        uses: peaceiris/actions-gh-pages@v4   # ✅ NEW (Node 24 supported)
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: output
          publish_dir: ./dist
